name: Deploy Blazor Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'DogGrommingScheduler/BlazorClient/**'
      - 'DogGrommingScheduler/Shared/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Blazor WASM
      run: dotnet publish DogGrommingScheduler/BlazorClient/BlazorClient.csproj -c Release -o ./publish

    - name: Create Dockerfile for nginx
      run: |
        cat > ./publish/wwwroot/Dockerfile << 'EOF'
        FROM nginx:alpine
        COPY . /usr/share/nginx/html
        RUN printf 'server {\n    listen 80;\n    location / {\n        root /usr/share/nginx/html;\n        try_files $uri $uri/ /index.html;\n    }\n}\n' > /etc/nginx/conf.d/default.conf
        EXPOSE 80
        EOF

    - name: Deploy to main-front
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
        publish_branch: main-front

    - name: Trigger Coolify Deploy
      run: |
        curl -X GET "http://100.31.44.207:8000/api/v1/deploy?uuid=lh80djb34p89iips5f125sem&force=false" \
        -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
