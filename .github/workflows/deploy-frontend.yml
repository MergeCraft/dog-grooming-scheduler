name: Deploy Frontend Blazor to AWS S3 & CloudFront

# 1. TRIGGER: When this workflow should run
on:
  push:
    branches:
      - main
    paths:
      # Only trigger if changes are made inside the Blazor frontend folder
      - 'DogGrommingScheduler/BlazorClient/**'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
    # 2. GET THE CODE
    - name: Checkout source code
      uses: actions/checkout@v4

    # 3. SETUP .NET 10 ENVIRONMENT
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 4. PUBLISH BLAZOR WASM
    # Blazor WASM compiles into static files (HTML, CSS, JS, .wasm)
    - name: Publish Blazor WASM
      run: dotnet publish ./DogGrommingScheduler/BlazorClient/BlazorClient.csproj -c Release -o ./publish-frontend

    # 5. AUTHENTICATE WITH AWS
    # We use the official AWS action to load the credentials securely
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 6. UPLOAD FILES TO S3 BUCKET
    # We sync ONLY the 'wwwroot' folder because it contains the final static website
    # The '--delete' flag removes old files in S3 that no longer exist in the project
    - name: Deploy to S3
      run: |
        aws s3 sync ./publish-frontend/wwwroot s3://dog-grooming-app --delete

    # 7. CLEAR CLOUDFRONT CACHE
    # This forces CloudFront servers globally to fetch our newly uploaded files
    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ secrets.AWS_CLOUDFRONT_ID }} --paths "/*"