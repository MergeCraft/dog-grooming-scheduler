name: Deploy Blazor Frontend to GitHub Pages

on:
  push:
    branches:
      - develop
      - deployTestLucas
    paths:
      - 'DogGrommingScheduler/BlazorClient/**'
      - 'DogGrommingScheduler/Shared/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish Blazor WASM
      run: dotnet publish DogGrommingScheduler/BlazorClient/BlazorClient.csproj -c Release -o ./publish

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
